<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — TERMINATED</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --dim: #003b00;
      --red: #ff2222;
      --amber: #ffb000;
      --bg: #020a02;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      cursor: none;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.25) 2px,
        rgba(0,0,0,0.25) 4px
      );
      pointer-events: none;
      z-index: 100;
      animation: flicker 8s infinite;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 99;
    }

    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.6; }
      99% { opacity: 1; }
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 18px; height: 18px;
      border: 2px solid var(--red);
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
    }
    #cursor::before, #cursor::after {
      content: '';
      position: absolute;
      background: var(--red);
    }
    #cursor::before { top: 50%; left: -6px; right: -6px; height: 1px; transform: translateY(-50%); }
    #cursor::after  { left: 50%; top: -6px; bottom: -6px; width: 1px; transform: translateX(-50%); }

    /* Main terminal */
    #terminal {
      position: fixed; inset: 0;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header bar */
    .term-header {
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--dim);
      padding-bottom: 10px;
      margin-bottom: 24px;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--dim);
    }
    .term-header .blink-dot {
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 6px var(--red);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Log area */
    #log {
      flex: 1;
      overflow: hidden;
      font-size: 0.82rem;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .line {
      display: flex;
      gap: 12px;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.05s, transform 0.05s;
      white-space: pre;
    }
    .line.show { opacity: 1; transform: none; }

    .line .ts   { color: var(--dim); min-width: 90px; }
    .line .tag  { min-width: 80px; }
    .line .tag.ok   { color: var(--green); }
    .line .tag.warn { color: var(--amber); }
    .line .tag.err  { color: var(--red); text-shadow: 0 0 8px var(--red); }
    .line .msg  { color: #aaffaa; }
    .line .msg.danger { color: var(--red); }
    .line .msg.warn   { color: var(--amber); }
    .line .msg.white  { color: #ddffdd; }

    /* Big 404 */
    #big404 {
      font-family: 'VT323', monospace;
      font-size: clamp(6rem, 18vw, 13rem);
      line-height: 1;
      color: var(--red);
      text-shadow:
        0 0 20px var(--red),
        0 0 60px rgba(255,34,34,0.4),
        2px 2px 0 #600;
      letter-spacing: 0.05em;
      opacity: 0;
      margin: 12px 0 4px;
      position: relative;
      animation: glitch404 0.1s steps(1) infinite;
    }
    @keyframes glitch404 {
      0%   { clip-path: inset(0 0 100% 0); color: var(--red); transform: none; }
      8%   { clip-path: inset(0 0 0 0);    color: var(--red); transform: none; }
      90%  { transform: none; }
      91%  { transform: translate(3px,-2px) skewX(-3deg); color: #ff0; }
      92%  { transform: translate(-3px,2px) skewX(2deg);  color: var(--red); }
      93%  { transform: none; }
    }

    .sub404 {
      font-family: 'VT323', monospace;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: var(--amber);
      letter-spacing: 0.25em;
      opacity: 0;
      text-shadow: 0 0 12px var(--amber);
      margin-bottom: 16px;
    }

    /* Progress bar */
    .pbar-wrap {
      opacity: 0;
      margin-top: 8px;
    }
    .pbar-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--red);
      margin-bottom: 4px;
    }
    .pbar-track {
      width: 100%;
      max-width: 480px;
      height: 14px;
      border: 1px solid var(--red);
      padding: 2px;
      position: relative;
    }
    .pbar-fill {
      height: 100%;
      width: 0%;
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
      transition: width 0.12s linear;
    }
    .pbar-pct {
      position: absolute;
      right: -56px;
      top: -1px;
      font-size: 0.75rem;
      color: var(--red);
    }

    /* Footer */
    .term-footer {
      margin-top: 20px;
      border-top: 1px solid var(--dim);
      padding-top: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.5s;
    }

    /* Glitch overlay */
    #glitch-overlay {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 98;
      opacity: 0;
    }
    .glitch-bar {
      position: absolute;
      left: 0; right: 0;
      background: rgba(255,34,34,0.08);
      height: 3px;
      animation: gbar 6s infinite;
    }
    @keyframes gbar {
      0%   { top: -10px; opacity: 0; }
      10%  { opacity: 1; }
      100% { top: 110vh; opacity: 0; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<div id="glitch-overlay">
  <div class="glitch-bar" style="animation-delay:0s;animation-duration:4s"></div>
  <div class="glitch-bar" style="animation-delay:1.5s;animation-duration:6s"></div>
  <div class="glitch-bar" style="animation-delay:3s;animation-duration:5s"></div>
</div>

<div id="terminal">
  <div class="term-header">
    <div class="blink-dot"></div>
    <span>SYS://KERNEL v4.20.11-DEAD &nbsp;|&nbsp; TTY0 &nbsp;|&nbsp; <span id="clock"></span></span>
    <span style="margin-left:auto">SESSION: <span style="color:var(--red)">TERMINATED</span></span>
  </div>

  <div id="log"></div>

  <div id="big404">404</div>
  <div class="sub404" id="sub">PAGE_NOT_FOUND :: RESOURCE_DESTROYED</div>

  <div class="pbar-wrap" id="pbar-wrap">
    <div class="pbar-label">[ PURGING MEMORY FRAGMENTS... ]</div>
    <div class="pbar-track">
      <div class="pbar-fill" id="pbar-fill"></div>
      <span class="pbar-pct" id="pbar-pct">0%</span>
    </div>
  </div>

  <div class="term-footer" id="footer">
    <span>ERR_CODE: 0x00404DEF &nbsp;|&nbsp; SECTOR: NULL</span>
    <span>กด F5 เพื่อลองอีกครั้ง — แต่จะไม่มีประโยชน์</span>
  </div>
</div>

<script>
  // Clock
  const clock = document.getElementById('clock');
  setInterval(() => {
    clock.textContent = new Date().toLocaleTimeString('en-GB') + ' UTC+7';
  }, 1000);

  // Cursor
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });

  // Log lines
  const lines = [
    { delay: 100,  tag: 'INIT',  cls: 'ok',   msg: 'กำลังบู้ตระบบ...', mc: 'white' },
    { delay: 400,  tag: 'DNS',   cls: 'ok',   msg: 'ค้นหา hostname: target.server.th', mc: '' },
    { delay: 750,  tag: 'CONN',  cls: 'ok',   msg: 'เชื่อมต่อ 203.151.x.x:443 → OK', mc: '' },
    { delay: 1100, tag: 'SCAN',  cls: 'warn', msg: 'ตรวจพบความผิดปกติใน routing table', mc: 'warn' },
    { delay: 1450, tag: 'WARN',  cls: 'warn', msg: 'REDIRECT LOOP DETECTED — retrying...', mc: 'warn' },
    { delay: 1800, tag: 'FETCH', cls: 'err',  msg: 'HTTP GET /index.html → FAILED', mc: 'danger' },
    { delay: 2100, tag: 'ERROR', cls: 'err',  msg: 'Resource หยุดตอบสนอง (timeout: 30000ms)', mc: 'danger' },
    { delay: 2400, tag: 'TRACE', cls: 'err',  msg: 'Stack trace: ENOTFOUND :: host unreachable', mc: 'danger' },
    { delay: 2750, tag: 'SYS',   cls: 'err',  msg: '⚠  หน้าเว็บนี้ไม่มีอยู่บนโลกนี้แล้ว ⚠', mc: 'danger' },
    { delay: 3100, tag: 'CORE',  cls: 'err',  msg: 'DUMPING CORE... segmentation fault (core dumped)', mc: 'danger' },
    { delay: 3450, tag: 'KILL',  cls: 'err',  msg: 'PROCESS TERMINATED — signal SIGKILL', mc: 'danger' },
  ];

  const log = document.getElementById('log');
  function ts() {
    return '[' + new Date().toLocaleTimeString('en-GB') + ']';
  }

  lines.forEach(({ delay, tag, cls, msg, mc }) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML =
        `<span class="ts">${ts()}</span>` +
        `<span class="tag ${cls}">[${tag.padEnd(5)}]</span>` +
        `<span class="msg ${mc}">${msg}</span>`;
      log.appendChild(div);
      requestAnimationFrame(() => div.classList.add('show'));
    }, delay);
  });

  // Show 404
  setTimeout(() => {
    const b = document.getElementById('big404');
    b.style.opacity = '1';
    b.style.animation = 'glitch404 0.1s steps(1) infinite';
  }, 3700);

  setTimeout(() => {
    document.getElementById('sub').style.opacity = '1';
  }, 3900);

  // Progress bar
  setTimeout(() => {
    const wrap = document.getElementById('pbar-wrap');
    const fill = document.getElementById('pbar-fill');
    const pct  = document.getElementById('pbar-pct');
    wrap.style.opacity = '1';
    let v = 0;
    const iv = setInterval(() => {
      v = Math.min(v + Math.random() * 4, 100);
      fill.style.width = v + '%';
      pct.textContent  = Math.floor(v) + '%';
      if (v >= 100) {
        clearInterval(iv);
        pct.textContent = '100%';
        setTimeout(() => {
          pct.textContent = 'PURGED';
          fill.style.background = '#003b00';
          fill.style.boxShadow  = 'none';
        }, 400);
      }
    }, 60);
  }, 4200);

  // Footer
  setTimeout(() => {
    document.getElementById('footer').style.opacity = '1';
  }, 4800);

  // Screen shake on load
  setTimeout(() => {
    document.body.style.transition = 'transform 0.05s';
    const shakes = [
      [2,-1],[−2,1],[1,-2],[−1,2],[2,0],[0,0]
    ].map(([x,y]) => `translate(${x}px,${y}px)`);
    let i = 0;
    const sh = setInterval(() => {
      document.body.style.transform = shakes[i] || 'none';
      if (++i >= shakes.length) clearInterval(sh);
    }, 50);
  }, 3650);

  // Random glitch flashes
  setInterval(() => {
    if (Math.random() > 0.7) {
      document.getElementById('glitch-overlay').style.opacity = '1';
      setTimeout(() => {
        document.getElementById('glitch-overlay').style.opacity = '0';
      }, 80);
    }
  }, 2000);
</script>
</body>
</html>
